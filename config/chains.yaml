# chains.yaml — Manually maintained chain definitions
#
# Add a chain here when you want Helios to:
#   1. Pull job postings from the chain's careers API
#   2. Track its locations separately from Overture-discovered POIs
#   3. Include it in the chain filter dropdown in the UI
#
# This file is NOT auto-generated. Edit freely.
# The labor market config (regions, scoring weights, OEWS params) lives in
# config/labor_market.yaml — regenerate that file from OEWS data, not this one.

chains:
  starbucks:
    display_name: Starbucks
    industry: soc_35
    careers_api:
      base_url: https://www.starbucks.com/careers/
      search_url: https://starbucks.wd1.myworkdayjobs.com/en-US/StarbucksExternalCareerSite
      api_url: https://starbucks.wd1.myworkdayjobs.com/wday/cxs/starbucks/StarbucksExternalCareerSite/jobs
      location_filter: Austin, TX, US
      radius_km: 40
      page_size: 20
    store_num_prefix: SB
    maps_search_query: Starbucks Austin TX
  dutch_bros:
    display_name: Dutch Bros
    industry: soc_35
    careers_api:
      base_url: https://careers.dutchbros.com/
      search_url: https://careers.dutchbros.com/us/en/search-results
      location_filter: Austin, TX
      radius_km: 40
    store_num_prefix: DB
    maps_search_query: Dutch Bros Austin TX

# ── Government employers ─────────────────────────────────────────────────────
# These use scrapers/workday_gov_adapter.py instead of careers_api.py.
# They are not chain-store employers — no store_num_prefix or maps_search_query.

gov_employers:
  austin_gov:
    display_name: City of Austin
    employer_name: City of Austin
    industry: soc_99  # government / public administration
    workday:
      tenant: austintexas
      wd_instance: wd5
      site_id: COA_Careers
      base_url: https://austintexas.wd5.myworkdayjobs.com
      search_url: https://austintexas.wd5.myworkdayjobs.com/en-US/COA_Careers
      api_url: https://austintexas.wd5.myworkdayjobs.com/wday/cxs/austintexas/COA_Careers/jobs
      page_size: 20
    default_location:
      address: Austin, TX
      lat: 30.2672
      lng: -97.7431


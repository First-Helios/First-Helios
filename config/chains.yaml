scoring:
  weights:
    careers_api: 0.40
    job_boards: 0.35
    sentiment: 0.25

  posting_age_decay:
    fresh_days: 7
    stale_days: 90

  tiers:
    critical:
      min_percentile: 67
      label: "critical"
    elevated:
      min_percentile: 33
      label: "elevated"
    adequate:
      min_percentile: 0
      label: "adequate"

targeting:
  weights:
    staffing_stress: 0.40
    wage_gap: 0.30
    isolation: 0.20
    local_alternatives: 0.10
  tiers:
    prime:
      min_score: 70
    strong:
      min_score: 45
    moderate:
      min_score: 0
  local_radius_mi: 2.0

rate_limits:
  careers_api:
    delay_seconds: 1.0
  google_maps:
    delay_min_seconds: 3.0
    delay_max_seconds: 5.0
  reddit:
    delay_seconds: 2.0
  bls:
    delay_seconds: 1.0

http:
  timeout_seconds: 30
  max_retries: 3
  backoff_factor: 2.0
  user_agent: "ChainStaffingTracker/1.0"


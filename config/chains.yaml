    williamson: "48491"
    hays: "48209"
    bastrop: "48021"
    caldwell: "48055"
  # NAICS codes to fetch from QCEW
  naics_codes:
    coffee_shops: "722515"        # Snack and Nonalcoholic Beverage Bars
    limited_service_restaurants: "722513"

      title: "Fast Food and Counter Workers"
    food_prep_workers:
      soc_code: "35-2021"
      title: "Food Preparation Workers"
    first_line_food_supervisors:
      soc_code: "35-1012"
      title: "First-Line Supervisors of Food Preparation and Serving Workers"
    baristas:
      soc_code: "35-3021"
      title: "Combined Food Preparation and Serving Workers, Including Fast Food"

# ── Economically-grounded scoring (replaces ad-hoc weights) ─────────────────
scoring:
  weights:
    demand_pressure: 0.35         # postings per establishment / regional baseline
    wage_competitiveness: 0.25    # chain wage vs market wage
    churn_signal: 0.25            # posting velocity vs expected turnover (JOLTS)
    qualitative: 0.15             # sentiment (Reddit + Google Reviews)

  posting_age_decay:
    fresh_days: 7
    stale_days: 90

  tiers:
    critical:
      min_percentile: 67
      label: "critical"
    elevated:
      min_percentile: 33
      label: "elevated"
    adequate:
      min_percentile: 0
      label: "adequate"

  # Baseline indexing — track metrics relative to a reference period
  baseline:
    reference_period: "2025-Q3"   # first full quarter of data collection
    reindex_on_new_qcew: true     # recompute baselines when QCEW data arrives

  # Seasonal adjustment — month-over-month indices
  seasonal:
    enabled: true
    # Typical hiring surge months for food service (BLS historical)
    peak_months: [5, 6, 7]        # May-Jul summer surge
    trough_months: [1, 2]         # Jan-Feb slowdown

# ── Scheduler ────────────────────────────────────────────────────────────────
scheduler:
  careers_api:
    cron:
      hour: 3
      minute: 0
  jobspy:
    cron:
      hour: 4
      minute: 0
  reddit:
    interval_hours: 6
  google_maps:
    cron:
      day_of_week: "mon"
      hour: 5
      minute: 0
  bls:
    cron:
      day_of_week: "mon"
      hour: 6
      minute: 0
  # Ground-truth data fetches (match government release cycles)
  qcew:
    cron:
      day: 1            # 1st of the month
      hour: 7
      minute: 0
    # Only check in months after quarterly release: Jan, Apr, Jul, Oct
    active_months: [1, 4, 7, 10]
  cbp:
    cron:
      day_of_week: "mon"
      hour: 8
      minute: 0
    # Annual check — only worth trying April each year
    active_months: [4]
  jolts:
    cron:
      day_of_week: "mon"
      hour: 6
      minute: 30
  laus:
    cron:
      day_of_week: "mon"
      hour: 6
      minute: 45
  baseline_recompute:
    cron:
      day_of_week: "sun"
      hour: 4
      minute: 0
  nlrb:
    cron:
      day_of_week: "wed"  # Mid-week; NLRB updates case data continuously
      hour: 7
      minute: 0
  warn_tx:
    cron:
      day_of_week: "tue"  # Texas ODP updates ~monthly; weekly check is fine
      hour: 7
      minute: 0

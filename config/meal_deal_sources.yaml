# meal_deal_sources.yaml — Chain deal page URLs and scraping strategies
#
# Generated from live page analysis (April 2026).
# strategy: static_html  → requests + BeautifulSoup
# strategy: playwright_required → needs collectors/playwright_fallback.py
# strategy: menu_only → no deals page; scrape menu for prices
# strategy: app_only → deals exist only in mobile app; skip or use API
#
# schedule: cron expression for when to re-scrape (deals change slowly)
# default: "0 6 * * 1" = Monday 6 AM

chain_deal_sources:

  # ── STATIC HTML (requests + BeautifulSoup) ──────────────────────────────

  mcdonalds:
    display_name: "McDonald's"
    strategy: static_html
    url: "https://www.mcdonalds.com/us/en-us/deals.html"
    notes: >
      Server-rendered HTML. Deals in h2/h3 headings with descriptions.
      Current deals: McValue menu with Meal Deals ($5-$6), Buy One Add One $1.
      Some deals are app-exclusive (noted in text). Cookie consent wall (OneTrust)
      but content loads before consent.
    selectors:
      deal_sections: "h2, h3"            # deal names in headings
      deal_description: "p"              # descriptions follow headings
      price_pattern: '\\$\\d+\\.?\\d*'   # prices embedded in text
    anti_scraping:
      - cookie_consent_wall
      - onetrust_cookie_manager
    schedule: "0 6 * * 1"

  taco_bell:
    display_name: "Taco Bell"
    strategy: static_html
    url: "https://www.tacobell.com/food/deals-and-combos"
    url_notes: "/deals returns 404 — must use /food/deals-and-combos"
    notes: >
      Server-rendered. Products section has links with deal names and
      "$X.XX | Cal" price+calorie format. Very structured, easy to parse.
      Yum! Brands cookie consent (Transcend).
    selectors:
      deal_items: "a[href*='/food/deals-and-combos/']"  # each deal is a link
      price_pattern: '\\$\\d+\\.\\d{2}'
      calorie_pattern: '\\d+-\\d+ Cal'
    anti_scraping:
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  pizza_hut:
    display_name: "Pizza Hut"
    strategy: static_html
    url: "https://www.pizzahut.com/deals"
    notes: >
      Server-rendered. Deal cards with names and "Starting at $X" pricing.
      Content loads before cookie consent. Yum! Brands cookie consent.
    selectors:
      deal_cards: ".deal-card, [class*='deal']"  # verify actual CSS classes
      deal_name: "h2, h3, [class*='title']"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - cookie_consent_wall
      - onetrust_cookie_manager
    schedule: "0 6 * * 1"

  dominos:
    display_name: "Domino's"
    strategy: static_html
    url: "https://www.dominos.com/deals"
    notes: >
      Server-rendered. Deal sections with h2 headings in ALL CAPS.
      Prices clearly stated. Has reCAPTCHA Enterprise but it doesn't
      block initial page load. "SEE LOCAL DEALS" requires location.
    selectors:
      deal_sections: "h2"                # deal names in uppercase h2
      deal_description: "p, [class*='detail']"
      price_pattern: '\\$\\d+\\.\\d{2}'
    anti_scraping:
      - recaptcha_enterprise
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  wendys:
    display_name: "Wendy's"
    strategy: static_html
    url: "https://www.wendys.com/deals"
    url_notes: "Redirects to /offers-coupons; use either URL"
    notes: >
      Server-rendered. Image-heavy deal cards. Deal names in image alt text
      and nearby text. Current deals: $1 off Premium Combo, Free 6pc Nuggs
      w/ $5 Purchase (Wednesday), Free Fry w/ $5 Purchase (Friday).
    selectors:
      deal_images: "img[alt*='$'], img[alt*='Free']"
      deal_text: "[class*='offer'], [class*='deal']"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  jimmy_johns:
    display_name: "Jimmy John's"
    strategy: static_html
    url: "https://www.jimmyjohns.com/menu"
    url_notes: "No /deals path; hero banner has featured deal, rest is menu"
    notes: >
      Partial SSR — hero deal content (e.g. $8.99 Meal Deal) renders
      server-side. Deeper menu content may need JS. Cookie consent wall.
      May need playwright_required if deeper parsing is needed.
    selectors:
      hero_deal: "h1, [class*='hero'], [class*='promo']"
      price_pattern: '\\$\\d+\\.\\d{2}'
    anti_scraping:
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  # ── MENU-ONLY (no dedicated deals page) ────────────────────────────────

  p_terrys:
    display_name: "P. Terry's"
    strategy: menu_only
    url: "https://pterrys.com/menu/"
    url_notes: "WordPress site. No deals/specials page. Menu has prices."
    notes: >
      Local Austin chain. WordPress static site, very easy to scrape.
      No rotating deals — prices are the menu prices. Could track
      seasonal shakes/drinks from homepage. Menu linked from nav.
    selectors:
      menu_sections: "h2"               # section headers (Burgers, etc.)
      menu_items: "[class*='menu-item'], h6"
      price_pattern: '\\$\\d+\\.\\d{2}'
    anti_scraping: []
    schedule: "0 6 * * 1"

  thundercloud_subs:
    display_name: "ThunderCloud Subs"
    strategy: menu_only
    url: "https://thundercloud.com/main-menu/"
    url_notes: "WordPress site. Full menu with prices."
    notes: >
      Local Austin chain. WordPress static HTML, easiest to scrape.
      Item names in h6 tags, prices inline as '$X.XX / $Y.YY' (small/large).
      Combo section has bundled deals. No separate deals page.
    selectors:
      sections: "h2"                     # "Signature Subs", "Classic Subs", "Combos"
      item_names: "h6"                   # each menu item name
      price_pattern: '\\$\\d+\\.\\d{2}'  # two prices = small/large
    anti_scraping: []
    schedule: "0 6 * * 1"

  taco_cabana:
    display_name: "Taco Cabana"
    strategy: static_html
    url: "https://www.tacocabana.com/menu/"
    url_notes: "/deals returns 404; /menu has 'Meal Deals' and 'Double Happy Hour' sections"
    notes: >
      WordPress site. The /menu page has structured sections including
      'LIMITED TIME OFFERS', 'MEAL DEALS', and 'DOUBLE HAPPY HOUR'
      with specific prices ($3 items, $2.50 margaritas). h5 section headers.
      Very scrapable.
    selectors:
      sections: "h5"                     # "LIMITED TIME OFFERS", "MEAL DEALS", etc.
      deal_items: "a[href*='olo.tacocabana.com']"
      item_names: "a[href*='olo.tacocabana.com'] + text"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - cookie_consent_wall             # simple cookie banner
    schedule: "0 6 * * 1"

  # ── PLAYWRIGHT REQUIRED (full JS SPA) ──────────────────────────────────

  subway:
    display_name: "Subway"
    strategy: playwright_required
    url: "https://www.subway.com/en-us/menunutrition/deals"
    notes: >
      Full React/Angular SPA. All static fetch attempts return empty.
      Aggressive tracking pixel redirect chain. Requires full browser
      rendering via playwright_fallback.py. Cookie consent wall.
    selectors:
      # Must inspect with Playwright — no SSR content available
      deal_cards: "[class*='deal'], [class*='offer'], [class*='promo']"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - full_spa_no_ssr
      - tracking_pixel_redirects
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  sonic:
    display_name: "Sonic Drive-In"
    strategy: playwright_required
    url: "https://www.sonicdrivein.com/deals"
    notes: >
      Full JS SPA. Redirects through DoubleClick tracking pixel chain
      before rendering. Requires Playwright with wait_for_selector.
    selectors:
      deal_cards: "[class*='deal'], [class*='offer']"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - full_spa_no_ssr
      - doubleclick_redirect_chain
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  jack_in_the_box:
    display_name: "Jack in the Box"
    strategy: playwright_required
    url: "https://www.jackinthebox.com/deals"
    url_notes: >
      /deals and /offers both 404. Try /food/cravings-value-menu or
      inspect with Playwright for correct route. SPA with dynamic routing.
    notes: >
      Full JS SPA with client-side routing. All tested URL paths returned
      404 or empty content via static fetch. Must discover correct URL
      with Playwright browser inspection.
    selectors:
      deal_cards: "[class*='deal'], [class*='menu-item'], [class*='value']"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - full_spa_no_ssr
      - dynamic_client_routing
    schedule: "0 6 * * 1"

  chipotle:
    display_name: "Chipotle"
    strategy: playwright_required
    url: "https://www.chipotle.com/deals"
    url_notes: >
      Chipotle doesn't traditionally have 'deals'. Their promotions
      are reward/loyalty based. May need /rewards or /menu instead.
    notes: >
      Full React SPA. Redirects through DoubleClick tracking chain.
      Chipotle rarely has traditional 'deals' — mostly rewards program.
      Consider scraping /menu for prices or /rewards for point offers.
    selectors:
      deal_cards: "[class*='promo'], [class*='reward'], [class*='offer']"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - full_spa_no_ssr
      - doubleclick_redirect_chain
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  smoothie_king:
    display_name: "Smoothie King"
    strategy: playwright_required
    url: "https://www.smoothieking.com/deals"
    url_notes: "Both /deals and /menu redirect through DoubleClick"
    notes: >
      Full JS SPA. Every page redirects through DoubleClick tracking
      before rendering. Aggressive ad-tech integration. Requires Playwright
      with extended wait times for content to load post-redirect.
    selectors:
      deal_cards: "[class*='deal'], [class*='promo'], [class*='special']"
      price_pattern: '\\$\\d+\\.?\\d*'
    anti_scraping:
      - full_spa_no_ssr
      - doubleclick_redirect_chain
      - cookie_consent_wall
    schedule: "0 6 * * 1"

  whataburger:
    display_name: "Whataburger"
    strategy: app_only
    url: "https://www.whataburger.com/offers"
    url_notes: "/offers loads the homepage — deals are app-exclusive via MyWhataburger"
    notes: >
      Whataburger's deals/offers are EXCLUSIVELY in their mobile app
      (MyWhataburger). No public web deals page exists. The /offers
      URL loads the homepage. Options: (1) skip deal scraping entirely,
      (2) scrape /menu for base prices via Playwright, (3) if an API
      is discovered in the app, use that. For now, mark as app_only.
    selectors: {}
    anti_scraping:
      - app_only_deals
      - full_spa_no_ssr
    schedule: "0 6 * * 1"

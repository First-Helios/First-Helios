# scheduler.yaml — APScheduler job configuration
#
# Each key matches a job ID in backend/scheduler.py.
# The scheduler reads these at startup; hardcoded defaults in scheduler.py
# are only used if a key is absent here.
#
# Trigger types:
#   cron     — runs at a fixed wall-clock time (day_of_week, day, hour, minute)
#   interval — runs every N hours from server start
#
# All times are server-local (currently US Central / Austin).
# Sunday early-morning slots are staggered to avoid simultaneous DB writes.
#
# To disable a job: set enabled: false (scheduler.py checks this flag).
# To override a single field: edit only that field; others keep their defaults.

# ── Job Postings ──────────────────────────────────────────────────────────────

jobspy:
  enabled: true
  description: "JobSpy multi-board scraper — LinkedIn, Indeed, Glassdoor, ZipRecruiter"
  trigger: cron
  cron:
    hour: 4
    minute: 0

reddit:
  enabled: true
  description: "Reddit sentiment — r/Austin, r/austinjobs, r/AustinJobs"
  trigger: interval
  interval_hours: 6

austin_gov:
  enabled: true
  description: "City of Austin Workday portal — all active municipal postings"
  trigger: cron
  cron:
    hour: 5
    minute: 30

usajobs:
  enabled: true
  description: "USAJobs federal listings — Austin TX location filter, up to 1000/day"
  trigger: cron
  cron:
    hour: 6
    minute: 0

serpapi_jobs:
  enabled: true
  description: "SerpAPI Google Jobs — 250 searches/month, 8/day at 3-hour intervals"
  trigger: interval
  interval_hours: 3

theirstack:
  enabled: true
  description: "TheirStack Jobs — 200 calls/month, 6/day at 4-hour intervals"
  trigger: interval
  interval_hours: 4

# ── Labor Market / Regulatory Data ───────────────────────────────────────────

bls:
  enabled: true
  description: "BLS wage data — v2 bulk if BLS_API_KEY set, else v1 legacy"
  trigger: cron
  cron:
    day_of_week: mon
    hour: 6
    minute: 0

qcew:
  enabled: true
  description: "QCEW quarterly establishment counts — skip guard: Jan/Apr/Jul/Oct only"
  trigger: cron
  cron:
    day: 1        # 1st of the month
    hour: 7
    minute: 0

cbp:
  enabled: true
  description: "Census County Business Patterns — skip guard: April release only"
  trigger: cron
  cron:
    day_of_week: mon
    hour: 8
    minute: 0

nlrb:
  enabled: true
  description: "NLRB labor unrest cases for tracked employer chains"
  trigger: cron
  cron:
    day_of_week: wed
    hour: 7
    minute: 0

warn_tx:
  enabled: true
  description: "Texas WARN Act layoff filings"
  trigger: cron
  cron:
    day_of_week: tue
    hour: 7
    minute: 0

baseline_recompute:
  enabled: true
  description: "Recompute labor market baselines from QCEW/OEWS ground-truth data"
  trigger: cron
  cron:
    day_of_week: sun
    hour: 4
    minute: 0

# ── Store / Employer Discovery (Sunday stagger) ───────────────────────────────

atp_starbucks_austin:
  enabled: true
  description: "AllThePlaces GeoJSON — Starbucks store discovery"
  trigger: cron
  cron:
    day_of_week: sun
    hour: 2
    minute: 0

overture_starbucks_austin:
  enabled: true
  description: "Overture Maps chain cross-validation — Starbucks"
  trigger: cron
  cron:
    day_of_week: sun
    hour: 2
    minute: 15

osm_starbucks_austin:
  enabled: true
  description: "OpenStreetMap Overpass fallback — Starbucks"
  trigger: cron
  cron:
    day_of_week: sun
    hour: 2
    minute: 30

overture_local_austin:
  enabled: true
  description: "Overture Maps local employer discovery — all Austin POIs"
  trigger: cron
  cron:
    day_of_week: sun
    hour: 3
    minute: 0

# ── Maintenance ───────────────────────────────────────────────────────────────

google_maps:
  enabled: true
  description: "Google Maps reviews scraper — chain location sentiment"
  trigger: cron
  cron:
    day_of_week: mon
    hour: 5
    minute: 0

posting_expiry:
  enabled: true
  description: "Mark job postings inactive when expires_at has passed"
  trigger: cron
  cron:
    hour: 3
    minute: 0

posting_purge:
  enabled: true
  description: "Hard-delete job postings older than POSTING_PURGE_DAYS (default: 90)"
  trigger: cron
  cron:
    day_of_week: sun
    hour: 3
    minute: 30

# ── Events Maintenance ────────────────────────────────────────────────────────

event_expiry:
  enabled: true
  description: "Mark events inactive when expires_at has passed"
  trigger: cron
  cron:
    hour: 3
    minute: 30

event_purge:
  enabled: true
  description: "Hard-delete inactive events older than 90 days"
  trigger: cron
  cron:
    day_of_week: sun
    hour: 4
    minute: 0

# ── Data Hygiene ──────────────────────────────────────────────────────────────

log_purge:
  enabled: true
  description: "Purge api_request_log rows older than 30 days"
  trigger: cron
  cron:
    day: 1
    hour: 2
    minute: 0

snapshot_purge:
  enabled: true
  description: "Purge snapshot rows older than 90 days"
  trigger: cron
  cron:
    day: 1
    hour: 2
    minute: 30

# ── SpiritPool Maintenance ────────────────────────────────────────────────────

burn_pool_cleanup:
  enabled: true
  description: "Delete expired burn_pool records (expires_at < NOW). 1-year TTL."
  trigger: cron
  cron:
    hour: 2
    minute: 45

# ── Meal Deal Infrastructure ─────────────────────────────────────────────────

osm_url_resolver:
  enabled: true
  description: "Resolve restaurant website URLs from OSM Overpass (free, batch). Sunday 1 AM."
  trigger: cron
  cron:
    day_of_week: sun
    hour: 1
    minute: 0

google_places_resolver:
  enabled: true
  description: "Resolve remaining restaurant URLs via Google Places API (brands first, $200 budget). Tuesday 2 AM."
  trigger: cron
  cron:
    day_of_week: tue
    hour: 2
    minute: 0

deal_stale_sweep:
  enabled: true
  description: "Deactivate meal_deals not verified in 14+ days. Sunday 5 AM."
  trigger: cron
  cron:
    day_of_week: sun
    hour: 5
    minute: 0

# Deal collectors are auto-discovered from @deal_collector registry.
# Override schedule or disable them here:

deal_chain_deals:
  enabled: true
  description: "Scrape chain restaurant deal pages (static HTML). Monday 6 AM."

deal_website_scraper:
  enabled: true
  description: "Scrape local restaurant websites for deals. Mon/Wed/Fri 2 AM. Sites that block are flagged for SpiritPool."

deal_gbp_offers:
  enabled: true
  description: "Scrape Google Business Profile offer posts via SerpApi. Tue/Fri 3 AM."

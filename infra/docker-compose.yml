services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: helios-postgres
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: helios
      POSTGRES_DB: helios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios -d helios"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

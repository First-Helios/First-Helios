default_language_version:
  python: python3.12

repos:
  # Built-in housekeeping hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements          # catches stray breakpoint() and pdb imports
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Ruff — lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy — type-check via the project environment so the hook sees the same
  # installed deps (alembic, pytest, sqlalchemy, ...) and config as CI's
  # `uv run mypy .`, instead of an isolated env that drifts out of sync.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]

  # Conventional Commits — verify commit message format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

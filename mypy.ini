[mypy]
python_version = 3.12
strict = True
warn_unreachable = True
pretty = True
show_error_codes = True
show_column_numbers = True

# Strict for first-party code; relaxed for third-party stubs
[mypy-helios_core.*]
strict = True

[mypy-helios_parsing.*]
strict = True

# Tests get slightly relaxed treatment — fixtures often need Any
[mypy-test.*]
disallow_untyped_decorators = False

# Third-party libraries without stubs — silence "missing imports" noise
[mypy-selectolax.*]
ignore_missing_imports = True

[mypy-overpy.*]
ignore_missing_imports = True

[mypy-h3.*]
ignore_missing_imports = True

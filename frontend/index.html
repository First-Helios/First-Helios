<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Helios — Austin TX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="header">
        <div id="brand">
            <h1>First Helios</h1>
            <p>Labor Intelligence — Austin, TX</p>
        </div>
        <div id="mode-switcher">
            <button id="mode-targeting" class="mode-btn active">Job Fair Map</button>
            <button id="mode-pathfinder" class="mode-btn">Career Pathfinder</button>
        </div>

        <!-- Targeting mode controls -->
        <div id="targeting-controls" class="controls-group">
            <select id="industry-filter" title="Filter by industry">
                <option value="">All Industries</option>
            </select>
            <select id="chain-filter" title="Focus on one employer brand">
                <option value="">All Brands</option>
            </select>
            <button id="refresh-btn">Refresh</button>
            <span id="store-count" title="Employer count">—</span>
        </div>

        <!-- Pathfinder mode controls -->
        <div id="pathfinder-controls" class="controls-group" style="display:none">
            <div id="search-wrap">
                <input id="job-search" type="text" placeholder="Your current job title…" autocomplete="off" />
                <div id="job-autocomplete"></div>
            </div>
            <select id="wage-filter" title="Filter by wage direction">
                <option value="">Any Direction</option>
                <option value="up">Upward only</option>
                <option value="lateral_or_up">Lateral or up</option>
                <option value="lateral">Lateral only</option>
                <option value="lateral_or_down">Lateral or down</option>
                <option value="down">Down only</option>
            </select>
            <select id="cluster-filter" title="Filter by industry cluster">
                <option value="">Any cluster</option>
                <option value="in">Same industry</option>
                <option value="out">Out of industry</option>
            </select>
            <button id="search-btn">Find Paths</button>
            <span id="path-status">—</span>
        </div>
    </div>

    <div id="content-area">
        <div id="map-wrap">
            <div id="map"></div>
            <!-- Map legend sits over the map -->
            <div id="map-legend">
                <span class="legend-dot" style="background:#f0a500"></span> Brand-heavy
                <span class="legend-dot" style="background:#6c5ce7"></span> Local-heavy
                <span style="opacity:0.6;font-size:11px"> · click hex for listings</span>
            </div>
        </div>

        <!-- Right panel — targeting and pathfinder sidebars -->
        <div id="right-panel">
            <!-- Targeting sidebar -->
            <div id="targeting-sidebar" class="sidebar">
                <div id="sidebar-top-targets">
                    <h2>Top Targets</h2>
                    <div id="targets-list"></div>
                </div>
                <div id="sidebar-listings" style="display:none">
                    <div class="listings-header">
                        <button id="listings-back-btn" class="back-btn">← Back</button>
                        <span id="listings-title"></span>
                    </div>
                    <div id="listings-list"></div>
                </div>
            </div>

            <!-- Pathfinder sidebar -->
            <div id="pathfinder-sidebar" class="sidebar" style="display:none">
                <div id="pathfinder-origin"></div>
                <h2>Where You Could Go</h2>
                <div id="paths-list"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    <script src="js/h3map.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pathfinder.js"></script>
</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-commit on all files
        run: uv run pre-commit run --all-files

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen


      - name: Run mypy
        run: uv run mypy .

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: helios
          POSTGRES_PASSWORD: helios
          POSTGRES_DB: helios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helios"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://helios:helios@localhost:5432/helios_test
        run: uv run pytest --cov=packages --cov=apps --cov-report=term-missing

  lockfile:
    name: Lockfile up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check
